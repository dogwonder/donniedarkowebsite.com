name: Build and Deploy

on:
  schedule:
    # Runs at 06:42 on every day
    - cron: '42 6 * * *'
  workflow_dispatch:

jobs:
  build-and-deploy:
    name: Build and Deploy
    concurrency: ci-${{ github.ref }}
    runs-on: ubuntu-latest
    # PLAUSIBLE_KEY is an environment secret on this environment; the job must
    # declare it to receive the secret at build time.
    environment: github-pages

    strategy:
      matrix:
        node-version: [20.x]

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🔧 Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: 📦 Install dependencies & build project
        env:
          PLAUSIBLE_KEY: ${{ secrets.PLAUSIBLE_KEY }}
          PLAUSIBLE_SITE: donniedarkowebsite.com
        run: |
          npm ci
          npm run build

      - name: 🚀 Deploy to GitHub Pages
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          branch: main
          folder: docs
          commit_message: "chore: generate daily build"