<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>cellar door</title>
<link rel="icon" type="image/png" href="../../assets/favicon-frank.png">
<link rel="stylesheet" href="../../colors_and_type.css">
<link rel="stylesheet" href="../../cellar.css">
<link rel="stylesheet" href="../../shards.css">
<style>
  /* THE DOOR — terminal state. perfectly static. no exit.
     the chalkboard still carries the scene; it bleeds in and out of black. */
  .scene-bg {
    position:absolute; inset:0; width:100%; height:100%; object-fit:cover; object-position:center 38%;
    image-rendering:pixelated; image-rendering:crisp-edges;
    filter:grayscale(1) contrast(1.18) brightness(0.62);
    user-select:none; -webkit-user-drag:none;
  }
  /* vignette + floor sink to black so the still settles into the void */
  .vignette {
    position:absolute; inset:0; pointer-events:none;
    background:
      radial-gradient(120% 90% at 50% 36%, transparent 38%, rgba(0,0,0,0.55) 78%, #000 100%),
      linear-gradient(to bottom, rgba(0,0,0,0.25) 0%, transparent 30%, transparent 52%, rgba(0,0,0,0.92) 100%);
  }

  .held {
    position:absolute; left:7%; bottom:11%; z-index:3;
    font-family:var(--mono); -webkit-font-smoothing:none; text-transform:lowercase;
    font-size:12px; letter-spacing:0.3em; line-height:2.2; color:#dcdcdc;
    text-shadow:-1px 0 #000,0 1px #000,1px 0 #000,0 -1px #000;
  }
</style>
</head>
<body>
  <div class="stage-viewport">
    <div class="stage is-dark" data-screen-label="06 — the door">

      <canvas class="scene-bg" id="bgpx" aria-hidden="true"></canvas>
      <div class="vignette"></div>

      <svg class="vectors" id="vectors" viewBox="0 0 800 500" preserveAspectRatio="none" aria-hidden="true"></svg>

      <div class="held">
        you said the words.<br>
        the door is open.
      </div>

    </div>
  </div>

  <script src="../../stage.js"></script>
  <script src="../../vectors.js"></script>
  <script>
    /* pixelate the background: cover-fit into a small canvas, CSS upscales it
       nearest-neighbour. PX_BLOCK is the knob — larger = more pixelated. */
    (function () {
      var PX_BLOCK = 7;                 /* on-screen px per block (stage coords) */
      var cv = document.getElementById('bgpx');
      var img = new Image();
      img.onload = function () {
        var box = 800, boxH = 500;
        var PW = Math.max(2, Math.round(box / PX_BLOCK));
        var PH = Math.max(2, Math.round(PW * (boxH / box)));
        cv.width = PW; cv.height = PH;
        var ctx = cv.getContext('2d');
        var ir = img.width / img.height, tr = PW / PH, sw, sh, sx, sy;
        if (ir > tr) { sh = img.height; sw = sh * tr; sx = (img.width - sw) / 2; sy = 0; }
        else { sw = img.width; sh = sw / tr; sx = 0; sy = (img.height - sh) * 0.38; }
        ctx.imageSmoothingEnabled = true;
        ctx.drawImage(img, sx, sy, sw, sh, 0, 0, PW, PH);
      };
      img.src = '../../assets/scene-cellar-door-chalkboard.webp';
    })();
  </script>
  <script>
    Vectors.build(document.getElementById('vectors'), [
      { t:'needle', x:-20, y:120, len:300, ang:20,  w:1.2, color:'#cfcfcf', op:0.3 },
      { t:'needle', x:780, y:80,  len:260, ang:150, w:1,   color:'#bbbbbb', op:0.28 },
      { t:'cross',  x:700, y:120, r:6, color:'#9a9a9a', op:0.4 }
    ]);
  </script>
</body>
</html>
