<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>cellar door</title>
<link rel="icon" type="image/png" href="../../assets/favicon-frank.png">
<link rel="stylesheet" href="../../colors_and_type.css">
<link rel="stylesheet" href="../../vendor/98.css">
<link rel="stylesheet" href="../../cellar.css">
<style>
  .gate {
    left:50%; top:50%; transform:translate(-50%,-50%);
    width:300px; font-family:var(--mono); -webkit-font-smoothing:none;
  }
  .gate .title-bar-text { letter-spacing:0.04em; }
  .gate .window-body { margin:10px 10px 12px; }
  .prompt { margin:2px 0 12px; font-size:13px; color:#000; text-transform:lowercase; letter-spacing:0.08em; }
  .gate input[type=text] {
    width:100%; box-sizing:border-box; font-family:var(--mono); -webkit-font-smoothing:none;
    font-size:13px; letter-spacing:0.18em; padding:4px 5px;
  }
  .gate .field-row { margin-top:10px; justify-content:flex-end; }
  .gate button.ok { font-family:var(--mono); -webkit-font-smoothing:none; font-size:12px; padding:3px 16px; color:#000; text-transform:lowercase; }
</style>
</head>
<body>
  <div class="stage-viewport">
    <div class="stage is-dark" data-screen-label="04 — the whisper">

      <div class="window gate">
        <div class="title-bar">
          <div class="title-bar-text">whisper</div>
          <div class="title-bar-controls">
            <button id="close" aria-label="Close"></button>
          </div>
        </div>
        <div class="window-body">
          <p class="prompt">say the words.</p>
          <input type="text" id="pw" aria-label="the words" autocomplete="off" spellcheck="false" autofocus>
          <div class="field-row">
            <button class="ok" id="ok">ok</button>
          </div>
        </div>
      </div>


    </div>
  </div>

  <script src="../../stage.js"></script>
  <script>
    var pw = document.getElementById('pw');
    var ok = document.getElementById('ok');
    var wrongLines = ['THOSE ARE NOT THE WORDS.', 'TRY TO REMEMBER.', 'SHE TOLD YOU ONCE.'];
    var n = 0;
    function norm(s) { return s.toLowerCase().replace(/\s+/g, ' ').trim(); }
    function submit() {
      if (norm(pw.value) === 'cellar door') {
        window.location.href = 'frank.html';
      } else {
        window.alert(wrongLines[Math.min(n, wrongLines.length - 1)]);
        n++;
        pw.value = '';
        pw.focus();
      }
    }
    ok.addEventListener('click', submit);
    pw.addEventListener('keydown', function (e) { if (e.key === 'Enter') { e.preventDefault(); submit(); } });
    document.getElementById('close').addEventListener('click', function () {
      window.alert('YOU CANNOT CLOSE THIS.');
      pw.focus();
    });
    setTimeout(function () { pw.focus(); }, 100);
  </script>
</body>
</html>
