<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>cellar door</title>
<link rel="icon" type="image/png" href="../../assets/favicon-frank.png">
<link rel="stylesheet" href="../../colors_and_type.css">
<link rel="stylesheet" href="../../cellar.css">
<link rel="stylesheet" href="../../shards.css">
<style>
  /* near-total darkness. one faint mark, somewhere. */
  .whisper-line {
    position:absolute; left:50%; top:50%; transform:translate(-50%,-50%);
    font-family:var(--mono); -webkit-font-smoothing:none; text-transform:lowercase;
    font-size:12px; letter-spacing:0.34em; color:#262626; white-space:nowrap;
  }
  .mark.faint { opacity:0.32; transition: opacity 0.25s ease; }
  .mark.faint:hover { opacity:1; }
  .credit { color:#3a3a3a !important; }
  .credit .visitors { box-shadow: inset 0.2em 0.2em 0.2em 0 rgba(255,255,255,0.25), inset -0.2em -0.2em 0.2em 0 rgba(0,0,0,0.7); color:#0a4a0a; }
</style>
</head>
<body>
  <div class="stage-viewport">
    <div class="stage is-dark" data-screen-label="03 — the hunt">

      <div class="fragments" aria-hidden="true">
        <i class="frag sliced" style="left:6%;top:10%;width:240px;height:150px;background-image:url('../../assets/still-frank-mask.jpeg');background-position:50% 24%;transform:rotate(-2deg);opacity:0.2;"></i>
        <i class="frag sliced" style="left:68%;top:58%;width:250px;height:150px;background-image:url('../../assets/still-theater.jpeg');background-position:62% 46%;transform:rotate(1.5deg);opacity:0.18;"></i>
        <span class="shard dim" style="left:10%;top:40%;width:260px;transform:rotate(-2deg);opacity:0.5;"></span>
      </div>

      <svg class="vectors" id="vectors" viewBox="0 0 800 500" preserveAspectRatio="none" aria-hidden="true"></svg>

      <div class="whisper-line">her name was that of a bird.</div>

      <button class="mark faint" id="mark" aria-label="find the door" title=""></button>

      <div class="timestamp">10 . 02 . 1988</div>


    </div>
  </div>

  <script src="../../stage.js"></script>
  <script src="../../vectors.js"></script>
  <script>
    Vectors.build(document.getElementById('vectors'), [
      { t:'needle', x:-20, y:80,  len:300, ang:36,  w:2,   color:'#3a3a3a', op:0.7 },
      { t:'needle', x:820, y:120, len:300, ang:160, w:1.5, color:'#333',    op:0.7 },
      { t:'cross',  x:160, y:120, r:6, color:'#2e2e2e', op:0.85 },
      { t:'cross',  x:640, y:400, r:7, color:'#2e2e2e', op:0.7 }
    ]);
  </script>
  <script>
    /* randomize the one faint mark per visit, well inside the stage */
    var mark = document.getElementById('mark');
    var x = 12 + Math.random() * 70;   /* 12%–82% */
    var y = 16 + Math.random() * 62;   /* 16%–78% */
    mark.style.left = x.toFixed(2) + '%';
    mark.style.top  = y.toFixed(2) + '%';
    if (/[?&]still\b/.test(location.search)) mark.style.opacity = '0.7';   /* legible in the spread thumbnail */
    mark.addEventListener('click', function () { window.location.href = 'whisper.html'; });
  </script>
</body>
</html>
