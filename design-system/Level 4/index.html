<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>level 4 — cellar door</title>
<link rel="icon" type="image/png" href="assets/favicon-frank.png">
<link rel="stylesheet" href="colors_and_type.css">
<link rel="stylesheet" href="cellar.css">
<style>
  html, body { overflow:auto; background:#000; }
  body { display:block; }
  .sheet { max-width:1124px; margin:0 auto; padding:54px 30px 70px; }

  .head { margin-bottom:34px; }
  .kicker {
    font-family:var(--mono); -webkit-font-smoothing:none; text-transform:lowercase;
    font-size:11px; letter-spacing:0.34em; color:#5a5a5a; margin-bottom:14px;
  }
  .h-title {
    font-family:var(--mono); -webkit-font-smoothing:none; text-transform:lowercase;
    font-size:22px; letter-spacing:0.18em; color:#e8e8e8; margin:0 0 16px;
  }
  .arc {
    font-family:var(--mono); -webkit-font-smoothing:none; text-transform:lowercase;
    font-size:11px; letter-spacing:0.2em; color:#8a8a8a; line-height:2;
  }
  .arc .sep { color:var(--highlight); margin:0 0.55em; }

  .grid { display:grid; grid-template-columns:repeat(3, 1fr); gap:40px 22px; margin-top:38px; }

  .tile { display:block; text-decoration:none; color:inherit; }
  .thumb {
    position:relative; width:100%; aspect-ratio:8 / 5; overflow:hidden;
    background:#000; border:1px solid #2a2a2a; outline:0 solid var(--highlight);
  }
  .thumb iframe {
    position:absolute; top:0; left:0; width:800px; height:500px;
    border:0; transform-origin:top left; pointer-events:none;
  }
  .idx {
    position:absolute; top:8px; left:10px; z-index:3;
    font-family:var(--mono); -webkit-font-smoothing:none; font-size:13px; font-weight:700;
    letter-spacing:0.1em; color:#9a9a9a; text-shadow:-1px 0 #000,0 1px #000,1px 0 #000,0 -1px #000;
  }
  /* restrained affordance: the label is the click target, not the whole frame */
  .m-title { display:inline; text-decoration:underline; text-decoration-color:transparent; text-underline-offset:3px; text-decoration-thickness:1px; }
  .tile:hover .m-title { color:var(--highlight); text-decoration-color:var(--highlight); }
  .tile:hover .idx { color:var(--highlight); }
  .tile:hover .thumb { border-color:#444; }

  .meta { margin-top:11px; }
  .m-title {
    font-family:var(--mono); -webkit-font-smoothing:none; text-transform:lowercase;
    font-size:13px; letter-spacing:0.14em; color:#dcdcdc;
  }
  .m-url {
    font-family:var(--mono-alt), monospace; -webkit-font-smoothing:none;
    font-size:10px; letter-spacing:0.04em; color:#5e5e5e; margin-top:5px;
  }
  .m-mood {
    font-family:var(--mono); -webkit-font-smoothing:none; text-transform:uppercase;
    font-size:9px; letter-spacing:0.22em; color:#777; margin-top:8px;
  }
  .m-red {
    font-family:var(--mono); -webkit-font-smoothing:none; text-transform:lowercase;
    font-size:10px; letter-spacing:0.08em; color:#8a8a8a; margin-top:6px; line-height:1.5;
    display:flex; align-items:flex-start; gap:7px;
  }
  .m-red .dot { width:6px; height:6px; background:var(--highlight); flex:none; margin-top:4px; }

  .foot {
    margin-top:48px; border-top:1px solid #1d1d1d; padding-top:18px;
    display:flex; justify-content:space-between; flex-wrap:wrap; gap:12px;
    font-family:var(--mono); -webkit-font-smoothing:none; font-size:11px;
    letter-spacing:0.06em; color:#4f4f4f;
  }
  .foot a { color:#8a8a8a; text-decoration:underline; }
  .foot a:hover { text-decoration-color:var(--highlight); color:#cfcfcf; }
  .foot .vis {
    font-family:monospace; background:#000; color:var(--green); padding:2px 6px;
    box-shadow: inset 0.2em 0.2em 0.2em 0 rgba(255,255,255,0.5), inset -0.2em -0.2em 0.2em 0 rgba(0,0,0,0.7);
  }
</style>
</head>
<body>
  <div class="sheet">

    <div class="head">
      <div class="kicker">epilogue &nbsp;·&nbsp; non-canon &nbsp;·&nbsp; 10 . 02 . 1988</div>
      <h1 class="h-title">level four — cellar door</h1>
      <div class="arc">
        collapse <span class="sep">›</span> letter <span class="sep">›</span> darkness
        <span class="sep">›</span> whisper <span class="sep">›</span> countdown <span class="sep">›</span> light
      </div>
    </div>

    <div class="grid" id="grid"></div>

    <div class="foot">
      <div>co-created by richard kelly and hi-res! · 2001 &nbsp;—&nbsp; epilogue level, non-canon.</div>
      <div><a href="notes.html">the design</a> &nbsp;·&nbsp; <span class="vis">000128422</span></div>
    </div>

  </div>

  <script>
    var FRAMES = [
      { n:'01', t:'the collapse', url:'cellar/door/',           src:'cellar/door/index.html',   mood:'the void',              red:'.continue. — the only way forward' },
      { n:'02', t:'the letter',   url:'cellar/door/letter.html', src:'cellar/door/letter.html',  mood:'the document · paper',  red:'“cellar door” — the hint is the secret' },
      { n:'03', t:'the hunt',     url:'cellar/door/sparrow.html',src:'cellar/door/sparrow.html', mood:'the void',              red:'one faint mark, moved every visit' },
      { n:'04', t:'the whisper',  url:'cellar/door/whisper.html',src:'cellar/door/whisper.html', mood:'the desktop · win98',   red:'withheld — you must already know' },
      { n:'05', t:'frank',        url:'cellar/door/frank.html',  src:'cellar/door/frank.html',   mood:'the desktop',           red:'frank’s voice and the draining count' },
      { n:'06', t:'the door',     url:'cellar/door/end.html',    src:'cellar/door/end.html',     mood:'the void',              red:'spent — no signpost, no exit' }
    ];
    var grid = document.getElementById('grid');
    FRAMES.forEach(function (f) {
      var a = document.createElement('a');
      a.className = 'tile'; a.href = f.src;
      a.innerHTML =
        '<div class="thumb"><div class="idx">' + f.n + '</div>' +
        '<iframe loading="lazy" scrolling="no" tabindex="-1" src="' + f.src + '?still"></iframe></div>' +
        '<div class="meta">' +
          '<div class="m-title">' + f.t + '</div>' +
          '<div class="m-url">' + f.url + '</div>' +
          '<div class="m-mood">' + f.mood + '</div>' +
          '<div class="m-red"><span class="dot"></span><span>' + f.red + '</span></div>' +
        '</div>';
      grid.appendChild(a);
    });
    /* scale each 800×500 scene iframe to its thumbnail box */
    function scaleThumbs() {
      document.querySelectorAll('.thumb').forEach(function (box) {
        var s = box.clientWidth / 800;
        box.querySelector('iframe').style.transform = 'scale(' + s + ')';
      });
    }
    window.addEventListener('resize', scaleThumbs);
    window.addEventListener('load', scaleThumbs);
    setTimeout(scaleThumbs, 60);
  </script>
</body>
</html>
