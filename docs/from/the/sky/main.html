<script>
document.addEventListener('DOMContentLoaded', () => {
  ddScripts.setGradientHeight('gradient', '0.7');

  // Level 4 bridge. The L3 ending ("time is up, donnie") lands ~105s after the
  // FAA transcript (phone.swf) is requested — the same network-gated reveal the
  // sleepgolfing page uses for its exit link. Once the ending has settled, a
  // near-invisible cellar door appears in the lower-left of the frame.
  let armed = false;
  const observer = new PerformanceObserver((list) => {
    if (armed) return;
    for (const entry of list.getEntries()) {
      if (entry.name.includes('phone.swf')) {
        armed = true;
        setTimeout(() => {
          document.querySelector('[data-url]').removeAttribute('hidden');
        }, 108000);
        break;
      }
    }
  });
  observer.observe({ type: 'resource', buffered: true });
});
</script>
