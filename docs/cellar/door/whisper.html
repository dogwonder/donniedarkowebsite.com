<div class="stage-viewport">

<script src="/scripts/stage.js"></script>
<script src="/scripts/level4.js"></script>
<script>
var pw = document.getElementById('pw');
var ok = document.getElementById('ok');
var wrongLines = ['THOSE ARE NOT THE WORDS.', 'TRY TO REMEMBER.', 'SHE TOLD YOU ONCE.'];
var n = 0;
function norm(s) { return s.toLowerCase().replace(/\s+/g, ' ').trim(); }
function submit() {
    if (norm(pw.value) === 'cellar door') {
        /* carry the seed through to frank */
        window.location.href = '/cellar/door/frank.html' + window.location.search;
    } else {
        window.alert(wrongLines[Math.min(n, wrongLines.length - 1)]);
        n++;
        pw.value = '';
        pw.focus();
    }
}
ok.addEventListener('click', submit);
pw.addEventListener('keydown', function (e) { if (e.key === 'Enter') { e.preventDefault(); submit(); } });
document.getElementById('close').addEventListener('click', function () {
    window.alert('YOU CANNOT CLOSE THIS.');
    pw.focus();
});
setTimeout(function () { pw.focus(); }, 100);
</script>
