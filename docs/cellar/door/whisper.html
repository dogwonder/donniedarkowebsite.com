<!DOCTYPE html>
<html lang="en">
  <head>
    <title>donniedarko.com - redux</title>

    <link rel="icon" type="image/png" sizes="32x32" href="/images/favicon-frank.png">

    <style>html body {
    background-color: #000000 !important;
}
.aspect-ratio {
    position: relative;
    aspect-ratio: 800 / 500;
    background-color: #000;
}
/* Scanlines (the site's .interlace effect, page-scoped so it can't fight the
   stage geometry). pointer-events:none so the overlay never eats clicks. */
.aspect-ratio::before {
    content: "";
    pointer-events: none;
    z-index: 2;
    position: absolute;
    inset: 0;
    display: block;
    background: repeating-linear-gradient(to bottom, rgba(0,0,0,0.2), rgba(0,0,0,0.2) 1px, transparent 2px, transparent 3px);
}
.prompt {
    position: absolute;
    top: 22%;
    left: 50%;
    transform: translateX(-50%);
    width: 100%;
    text-align: center;
    font-family: var(--mono);
    font-size: clamp(0.75rem, 0.9vw, 0.85rem);
    color: #777;
    letter-spacing: 0.2em;
    text-transform: lowercase;
}
.aspect-ratio .window {
    position: absolute;
    top: 40%;
    left: 50%;
    transform: translateX(-50%);
    width: 280px;
    z-index: 10;
    font-family: var(--mono-alt);
}
.window .window-body {
    padding: 1rem;
}
form input {
    width: 100%;
    height: 24px;
    font-family: var(--mono);
    letter-spacing: 0.1em;
    color: #000; /* body.dark would otherwise render the words white-on-white */
}
@font-face {
      font-family: "Pixelated MS Sans Serif";
      font-style: normal;
      font-weight: 400;
      src: url(/fonts/ms_sans_serif.woff2) format("woff2");
    }
    @font-face {
      font-family: "Pixelated MS Sans Serif";
      font-style: normal;
      font-weight: 700;
      src: url(/fonts/ms_sans_serif_bold.woff2) format("woff2");
    }
    @font-face {
      font-family: "DepartureMono";
      font-style: normal;
      font-weight: 400;
      src: url(/fonts/DepartureMono-Regular.woff2) format("woff2");
    }</style>
    
    <!-- Default CSS generated by Eleventy -->
    <link rel="stylesheet" href="/scss/main.css"> 

    <!-- Tailwind CSS -->
    <link rel="stylesheet" href="/css/tailwind.css"> 

    <!-- 98.css -->
    <link rel="stylesheet" href="/css/98.css">

    

    <script defer="" data-domain="donniedarkowebsite.com" src="https://plausible.io/js/script.js"></script>

  </head>
  <body class="dark">

    <main>
      <div class="container full">
        
<div class="flex items-end h-full">
    <div class="aspect-ratio">

        <p class="prompt" id="prompt" style="display: none;">
            the two most beautiful words in the english language.
        </p>

        <div class="window">
            <div class="title-bar">
                <div class="title-bar-text">…?</div>
            </div>
            <div class="window-body">
                <form id="whisper-form" novalidate="">
                    <label for="password" class="visually-hidden">Say the words:</label>
                    <input type="text" id="password" name="password" autocomplete="off">
                </form>
            </div>
        </div>

    </div>
</div>

      </div>
      
    </main>
    
    
    

    

    
    
    <!--Bundle JS-->
    
    

    <!--Default JS-->
    <script src="/scripts/min/app.min.js"></script>

    
<script src="/scripts/level4.js"></script>
<script>
document.addEventListener('DOMContentLoaded', function() {

    setTimeout(function() {
        level4Scripts.animateText('prompt', 180);
    }, 1200);

    document.getElementById('whisper-form').addEventListener('submit', function(event) {
        event.preventDefault();
        var words = document.getElementById('password').value.trim().toLowerCase().replace(/\s+/g, ' ');
        if (words === 'cellar door') {
            // Carry the seed through to the end card.
            window.location.href = '/cellar/door/end.html' + window.location.search;
        } else {
            alert('those are not the words.');
        }
    });

});
</script>


    <!--Bundle SVG-->
    <svg width="0" height="0" aria-hidden="true" style="position: absolute;">
    <defs><filter id="noise" x="0%" y="0%" width="100%" height="100%">
<feTurbulence type="fractalNoise" baseFrequency="0 0.2" result="NOISE" numOctaves="2">
    <animate attributeName="baseFrequency" calcMode="discrete" dur="0.3s" values="0 0.3; 0 0.9; 0 0.4" repeatCount="indefinite"></animate>
</feTurbulence>
<feDisplacementMap in="SourceGraphic" in2="NOISE" scale="30" xChannelSelector="R" yChannelSelector="R"></feDisplacementMap>  
</filter>
<filter id="noise1" x="0%" y="0%" width="100%" height="100%">
<feTurbulence type="fractalNoise" baseFrequency="0 0.2" result="NOISE" numOctaves="2"></feTurbulence>
<feDisplacementMap in="SourceGraphic" in2="NOISE" scale="30" xChannelSelector="R" yChannelSelector="R"></feDisplacementMap>  
</filter>
<filter id="noise2" x="0%" y="0%" width="100%" height="100%">
<feTurbulence type="fractalNoise" baseFrequency="0 0.4" result="NOISE" numOctaves="2"></feTurbulence>
<feDisplacementMap in="SourceGraphic" in2="NOISE" scale="30" xChannelSelector="R" yChannelSelector="R"></feDisplacementMap>  
</filter>
<filter id="noise3" x="0%" y="0%" width="100%" height="100%">
<feTurbulence type="fractalNoise" baseFrequency="0 0.3" result="NOISE" numOctaves="2"></feTurbulence>
<feDisplacementMap in="SourceGraphic" in2="NOISE" scale="100" xChannelSelector="R" yChannelSelector="R"></feDisplacementMap>  
</filter>
<filter id="noise4" x="0%" y="0%" width="100%" height="100%">
<feTurbulence type="fractalNoise" baseFrequency="5 0.3" result="NOISE" numOctaves="2"></feTurbulence>
<feDisplacementMap in="SourceGraphic" in2="NOISE" scale="500" xChannelSelector="R" yChannelSelector="R"></feDisplacementMap>  
</filter>
<filter id="noisetv" x="0%" y="0%" width="100%" height="100%">
<feTurbulence id="turbulence">
    <animate attributeName="baseFrequency" dur="8s" values="0.9 0.9;0.8 0.8; 0.9 0.9"></animate>
</feTurbulence>
<feDisplacementMap in="SourceGraphic" scale="60"></feDisplacementMap>
</filter></defs>
</svg>
