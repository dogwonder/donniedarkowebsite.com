    <style>html body {
    background-color: #000000 !important;
}
.aspect-ratio {
    position: relative;
    aspect-ratio: 800 / 500;
    background-color: #050505;
    background-image: radial-gradient(ellipse at 50% 65%, #131110 0%, #050505 70%, #000 100%);
}
/* Scanlines (the site's .interlace effect, page-scoped so it can't fight the
   stage geometry). pointer-events:none so the overlay never eats clicks. */
.aspect-ratio::before {
    content: "";
    pointer-events: none;
    z-index: 2;
    position: absolute;
    inset: 0;
    display: block;
    background: repeating-linear-gradient(to bottom, rgba(0,0,0,0.2), rgba(0,0,0,0.2) 1px, transparent 2px, transparent 3px);
}
.hint {
    position: absolute;
    top: 8%;
    left: 12%;
    font-family: var(--mono);
    font-size: clamp(0.7rem, 0.85vw, 0.8rem);
    color: #3a3a3a;
    letter-spacing: 0.25em;
    text-transform: lowercase;
}
/* The cellar-door handle: a 44×44 hotspot whose position is randomised per
   visit (seeded for the walkthrough). The faint red mark sits at its centre. */
[data-url] {
    position: absolute;
    z-index: 999;
    width: 44px;
    height: 44px;
    margin: -22px 0 0 -22px; /* centre the hit area on the chosen point */
    background-color: transparent;
}
[data-url] .mark {
    position: absolute;
    top: 50%;
    left: 50%;
    width: 7px;
    height: 7px;
    margin: -3.5px 0 0 -3.5px;
    border-radius: 50%;
    background-color: rgba(252, 13, 27, 0.28);
    box-shadow: 0 0 6px 2px rgba(252, 13, 27, 0.12);
}
[data-url]:hover {
    cursor: pointer;
}
[data-url]:hover .mark {
    background-color: var(--highlight);
    box-shadow: 0 0 8px 3px rgba(252, 13, 27, 0.45);
    animation: flicker 0.1s 5;
}
@keyframes flicker {
    0% { opacity: 1; }
    50% { opacity: 0; }
    100% { opacity: 1; }
}

<script>
document.addEventListener('DOMContentLoaded', function() {

    level4Scripts.propagateSeed();

    // The handle moved when the timeline did: random per visit, deterministic

    level4Scripts.placeHotspot('[data-url]', { x0: 180, x1: 620, y0: 140, y1: 360 });

    setTimeout(function() {
        level4Scripts.animateText('hint', 200);
    }, 1500);

});
</script>
