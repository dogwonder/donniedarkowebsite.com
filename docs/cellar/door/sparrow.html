<script>
Vectors.build(document.getElementById('vectors'), [
    { t:'needle', x:-20, y:80,  len:300, ang:36,  w:2,   color:'#3a3a3a', op:0.7 },
    { t:'needle', x:820, y:120, len:300, ang:160, w:1.5, color:'#333',    op:0.7 },
    { t:'cross',  x:160, y:120, r:6, color:'#2e2e2e', op:0.85 },
    { t:'cross',  x:640, y:400, r:7, color:'#2e2e2e', op:0.7 }
]);
</script>
<script>
level4Scripts.propagateSeed();

/* two marks move every visit, well inside the stage (12%–82% x, 16%–78% y in
   stage coords). random per visit, deterministic when ?seed= is present (the
   headless walkthrough passes seed=42). they share ONE PRNG stream — the door
   mark draws first (so its seed-42 position predates the ring), and the ring
   redraws until it sits clear of the door.

   the hunt is two-phase (L1's grammar: the obituaries first, then the way on):
   only the ring exists at first. it opens the morning paper in a new tab;
   when that tab is CLOSED, the door mark fades in elsewhere in the dark. */
var rnd = level4Scripts.random();
var band = { x0: 96, x1: 656, y0: 80, y1: 390 };
var mark = document.getElementById('mark');
var obit = document.getElementById('obit');
var doorAt = level4Scripts.placeHotspot('#mark', band, { rnd: rnd });
level4Scripts.placeHotspot('#obit', band, { rnd: rnd, avoid: { x: doorAt.x, y: doorAt.y, r: 140 } });

function revealDoor() {
    if (!mark.hidden) return;
    mark.hidden = false;
    mark.classList.add('fade');
}

obit.addEventListener('click', function (e) {
    e.preventDefault();
    var w = window.open(obit.href, '_blank');
    if (!w) { revealDoor(); return; }            /* popup blocked — don't brick the level */
    var poll = setInterval(function () {
        if (w.closed) { clearInterval(poll); revealDoor(); }
    }, 400);
});

if (/[?&]still\b/.test(location.search)) {
    mark.hidden = false;
    mark.style.opacity = '0.7';   /* legible in the design spread */
    obit.style.opacity = '0.55';
}
</script>
