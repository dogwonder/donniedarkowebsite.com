    <style>html body {
    background-color: #000000 !important;
}
.aspect-ratio {
    position: relative;
    aspect-ratio: 800 / 500;
    background-color: #000;
}
/* Scanlines (the site's .interlace effect, page-scoped so it can't fight the
   stage geometry). pointer-events:none so the overlay never eats clicks. */
.aspect-ratio::before {
    content: "";
    pointer-events: none;
    z-index: 2;
    position: absolute;
    inset: 0;
    display: block;
    background: repeating-linear-gradient(to bottom, rgba(0,0,0,0.2), rgba(0,0,0,0.2) 1px, transparent 2px, transparent 3px);
}
.date {
    position: absolute;
    top: 6%;
    right: 5%;
    font-family: var(--mono);
    font-size: clamp(0.7rem, 0.9vw, 0.8rem);
    color: #555;
    letter-spacing: 0.4em;
}
#intro {
    position: absolute;
    top: 38%;
    left: 14%;
    max-width: 60%;
    font-family: var(--mono);
    font-size: clamp(0.8rem, 1vw, 0.95rem);
    color: #999;
    line-height: 2.2;
    letter-spacing: 0.12em;
    text-transform: lowercase;
}
a.continue {
    position: absolute;
    bottom: 14%;
    right: 12%;
    font-family: var(--mono);
    font-size: clamp(0.75rem, 0.9vw, 0.85rem);
    color: var(--highlight) !important;
    text-decoration: none;
    letter-spacing: 0.2em;
    opacity: 0;
    transition: opacity 2s ease-in-out;
}
a.continue:hover {
    animation: flicker 0.1s 5;
}
@keyframes flicker {
    0% { opacity: 1; }
    50% { opacity: 0; }
    100% { opacity: 1; }
}

<script>
document.addEventListener('DOMContentLoaded', function() {

    level4Scripts.propagateSeed();

    setTimeout(function() {
        level4Scripts.animateText('intro', 240);
    }, 1500);

    document.addEventListener('wordsFinished', function() {
        var link = document.querySelector('a.continue');
        link.removeAttribute('hidden');
        // Force a reflow so the opacity transition runs from the hidden state.
        void link.offsetWidth;
        link.style.opacity = 1;
    });

});
</script>
